<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register – Scholarship Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo-icon">🎓</div>
    <h2>Scholarship Portal</h2>
  </div>
  <button class="hamburger" id="ham" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-menu" id="menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="register.html" class="active">Register</a></li>
    <li><a href="search.html">Search</a></li>
    <li><a href="view_scholarships.html">Scholarships</a></li>
    <li><a href="admin.html">Admin</a></li>
  </ul>
</nav>

<div class="page-hero">
  <h1>Student Registration</h1>
  <p>Create your profile and start your scholarship journey today.</p>
</div>

<div class="section">
  <div class="form-card">
    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" placeholder="e.g. Amna Tahir">
      </div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" placeholder="you@example.com">
      </div>
    </div>
    <div class="form-group">
      <label>University / Institution</label>
      <div class="input-wrap">
        <span class="input-icon">🏫</span>
        <input type="text" placeholder="e.g. University of Karachi">
      </div>
    </div>
    <div class="form-group">
      <label>Field of Study</label>
      <div class="input-wrap">
        <span class="input-icon">📚</span>
        <input type="text" placeholder="e.g. Computer Science">
      </div>
    </div>
    <button class="btn-full">Create My Profile →</button>
  </div>
</div>

<footer class="footer">
  <p>© 2026 <strong>Scholarship Portal</strong> · Designed by Amna Tahir</p>
</footer>

<script>
  const ham = document.getElementById('ham');
  const menu = document.getElementById('menu');
  ham.addEventListener('click', () => { ham.classList.toggle('open'); menu.classList.toggle('open'); });
  menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { ham.classList.remove('open'); menu.classList.remove('open'); }));
</script>
</body>
</html>
